<script type="text/babel" data-presets="env,react">
const { useEffect, useState, useMemo } = React;

/* ---------- FadeIn ---------- */
function FadeIn({ delay = 0, duration = 1000, children, className = "", style = {} }) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const t = setTimeout(() => setVisible(true), delay);
    return () => clearTimeout(t);
  }, [delay]);
  return (
    <div
      className={`transition-opacity ${className}`}
      style={{
        opacity: visible ? 1 : 0,
        transitionDuration: `${duration}ms`,
        ...style,
      }}
    >
      {children}
    </div>
  );
}

/* ---------- AnimatedHeading ---------- */
function AnimatedHeading({ text, className = "", style = {}, initialDelay = 200, charDelay = 30 }) {
  const [on, setOn] = useState(false);
  useEffect(() => {
    const t = setTimeout(() => setOn(true), initialDelay);
    return () => clearTimeout(t);
  }, [initialDelay]);

  const lines = useMemo(() => text.split("\n"), [text]);

  return (
    <h1 className={className} style={style}>
      {lines.map((line, lineIndex) => {
        const lineLength = line.length;
        return (
          <span key={lineIndex} style={{ display: "block" }}>
            {Array.from(line).map((ch, charIndex) => {
              const delay =
                lineIndex * lineLength * charDelay + charIndex * charDelay;
              return (
                <span
                  key={charIndex}
                  style={{
                    display: "inline-block",
                    opacity: on ? 1 : 0,
                    transform: on ? "translateX(0)" : "translateX(-18px)",
                    transition: `opacity 500ms ease ${delay}ms, transform 500ms ease ${delay}ms`,
                    whiteSpace: "pre",
                  }}
                >
                  {ch === " " ? " " : ch}
                </span>
              );
            })}
          </span>
        );
      })}
    </h1>
  );
}

/* ---------- CyclingWord ---------- */
function CyclingWord({ words, interval = 2000 }) {
  const [pos, setPos] = useState(0);
  const [animate, setAnimate] = useState(true);
  const DUR_MS = 650;
  const EASE = "cubic-bezier(0.22, 1, 0.36, 1)";
  const BLOCK = 1.4;
  const N = words.length;

  useEffect(() => {
    const id = setInterval(() => {
      setPos((p) => {
        if (p >= N) {
          setAnimate(false);
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              setAnimate(true);
              setPos(1);
            });
          });
          return 0;
        }
        setAnimate(true);
        return p + 1;
      });
    }, interval);
    return () => clearInterval(id);
  }, [interval, N]);

  const widest = words.reduce((a, b) => (a.length >= b.length ? a : b));
  const loopList = [...words, words[0]];

  return (
    <span
      style={{
        display: "inline-block",
        position: "relative",
        height: `${BLOCK}em`,
        lineHeight: BLOCK,
        overflow: "hidden",
        verticalAlign: "middle",
        transform: "translateY(-0.04em)",
      }}
    >
      <span
        aria-hidden="true"
        style={{ visibility: "hidden", whiteSpace: "nowrap" }}
      >
        {widest}
      </span>

      <span
        style={{
          position: "absolute",
          left: 0,
          top: 0,
          display: "block",
          transform: `translateY(-${pos * BLOCK}em)`,
          transition: animate ? `transform ${DUR_MS}ms ${EASE}` : "none",
          whiteSpace: "nowrap",
        }}
      >
        {loopList.map((w, i) => (
          <span
            key={i}
            style={{
              display: "block",
              height: `${BLOCK}em`,
              lineHeight: BLOCK,
            }}
          >
            {w}
          </span>
        ))}
      </span>
    </span>
  );
}

      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>

      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>

  ];

  return (
    <section className="bg-transparent w-full py-24 px-6">

          <div className="text-[#0f1c2e]/40 tracking-widest text-xs font-medium uppercase">
            How It Works
          </div>
          <h2
            className="text-3xl md:text-4xl font-normal text-[#0f1c2e] max-w-lg mt-4 mb-16"

        </div>

        <div className="bg-white/50 backdrop-blur-xl border border-white/80 shadow-lg rounded-2xl overflow-hidden">
          <div className="bg-white/40 backdrop-blur border-b border-white/60 px-8 py-4 flex items-center justify-between">
            <div className="text-xs font-mono text-[#0f1c2e]/30">
              {current.num} / 06
            </div>
            <div className="text-sm font-semibold text-[#0f1c2e] tracking-tight text-center flex-1 px-4 truncate">
              {current.title}
            </div>
            <div className="flex gap-1.5">
              <span className="w-2.5 h-2.5 rounded-full" style={{ background: "#ff5f57" }}></span>
              <span className="w-2.5 h-2.5 rounded-full" style={{ background: "#ffbd2e" }}></span>
              <span className="w-2.5 h-2.5 rounded-full" style={{ background: "#28c840" }}></span>
            </div>
          </div>

          <div
            key={active}
            className="grid grid-cols-1 md:grid-cols-5 gap-0 items-stretch"
            style={{ animation: "howFadeIn 300ms ease-in-out", minHeight: "18rem" }}
          >
            <div className="md:col-span-3 bg-transparent p-10 flex items-center justify-center">
              <div className="rounded-2xl bg-white/40 border border-white/60 p-10 flex items-center justify-center">
                {stepIcons[active]}
              </div>
            </div>

            <div className="md:col-span-2 bg-white/20 border-l border-white/40 p-8 flex flex-col justify-between gap-6">
              <div className="text-sm text-[#0f1c2e]/65 leading-relaxed">
                {current.description}
              </div>
              <div className="flex flex-wrap gap-2">
                {current.tags.map((tag) => (
                  <span
                    key={tag}
                    className="bg-white/60 backdrop-blur border border-white/70 rounded-full px-3 py-1 text-xs text-[#0f1c2e]/60"
                  >
                    {tag}
                  </span>
                ))}
              </div>
            </div>
          </div>
        </div>

        <div className="mt-6 flex items-center gap-4">
          <button
            onClick={goPrev}
            aria-label="Previous step"
            className="rounded-full w-9 h-9 border border-[#0f1c2e]/15 bg-white/60 backdrop-blur flex items-center justify-center hover:bg-white/90 transition-all shrink-0"
          >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0f1c2e" strokeOpacity="0.5" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>

          <div className="flex-1 h-0.5 rounded-full relative overflow-hidden" style={{ background: "rgba(15, 28, 46, 0.08)" }}>
            <div
              key={tick}
              className="absolute left-0 top-0 h-full rounded-full"
              style={{
                background: "#c9a84c",
                animation: "howProgress 8000ms linear forwards",
              }}
            ></div>
          </div>

          <button
            onClick={goNext}
            aria-label="Next step"
            className="rounded-full w-9 h-9 border border-[#0f1c2e]/15 bg-white/60 backdrop-blur flex items-center justify-center hover:bg-white/90 transition-all shrink-0"
          >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0f1c2e" strokeOpacity="0.5" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>

          <div className="text-xs text-[#0f1c2e]/30 shrink-0">
            {current.num} / 06
          </div>
        </div>
      </div>
    </section>
  );
}
