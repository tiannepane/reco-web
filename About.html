<style>
  html, body {
    margin: 0; padding: 0; min-height: 100%; color: #0f1c2e;
  }
  body {
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background:
      radial-gradient(ellipse at 20% 0%, #dce8ff 0%, transparent 50%),
      radial-gradient(ellipse at 80% 10%, #e8f0ff 0%, transparent 40%),
      #f5f7fa;
    background-attachment: fixed;
    overflow-x: hidden;
  }

  /* Liquid-glass navbar — same as homepage */
  .liquid-glass {
    background: rgba(255, 255, 255, 0.38);
    background-blend-mode: luminosity;
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.55);
    box-shadow:
      0 1px 2px rgba(15, 23, 42, 0.04),
      0 6px 16px rgba(15, 23, 42, 0.08),
      0 24px 48px -12px rgba(15, 23, 42, 0.18),
      inset 0 1px 0 rgba(255, 255, 255, 0.9),
      inset 0 -1px 0 rgba(15, 23, 42, 0.05);
    position: relative;
    overflow: hidden;
    isolation: isolate;
  }
  .liquid-glass::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1.2px;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.95) 0%,
      rgba(255,255,255,0.45) 18%,
      rgba(255,255,255,0.08) 42%,
      rgba(255,255,255,0.08) 58%,
      rgba(255,255,255,0.45) 82%,
      rgba(255,255,255,0.95) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
  }
  .liquid-glass::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.55) 0%,
      rgba(255,255,255,0.12) 18%,
      rgba(255,255,255,0) 45%);
    pointer-events: none;
    mix-blend-mode: overlay;
    opacity: 0.9;
  }
  .liquid-glass > * {
    position: relative;
    z-index: 1;
  }

</style>
</head>
