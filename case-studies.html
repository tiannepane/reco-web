<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Case Studies — REcollab</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } },
  };
</script>

<style>
  html, body {
    margin: 0; padding: 0; min-height: 100%; color: #0f1c2e;
  }
  body {
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background:
      radial-gradient(ellipse at 20% 0%, #dce8ff 0%, transparent 50%),
      radial-gradient(ellipse at 80% 10%, #e8f0ff 0%, transparent 40%),
      #f5f7fa;
    background-attachment: fixed;
    overflow-x: hidden;
  }
  .liquid-glass {
    background: rgba(255, 255, 255, 0.38);
    background-blend-mode: luminosity;
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.55);
    box-shadow:
      0 1px 2px rgba(15, 23, 42, 0.04),
      0 6px 16px rgba(15, 23, 42, 0.08),
      0 24px 48px -12px rgba(15, 23, 42, 0.18),
      inset 0 1px 0 rgba(255, 255, 255, 0.9),
      inset 0 -1px 0 rgba(15, 23, 42, 0.05);
    position: relative;
    overflow: hidden;
    isolation: isolate;
  }
  .liquid-glass::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1.2px;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.95) 0%,
      rgba(255,255,255,0.45) 18%,
      rgba(255,255,255,0.08) 42%,
      rgba(255,255,255,0.08) 58%,
      rgba(255,255,255,0.45) 82%,
      rgba(255,255,255,0.95) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
  }
  .liquid-glass::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.55) 0%,
      rgba(255,255,255,0.12) 18%,
      rgba(255,255,255,0) 45%);
    pointer-events: none;
    mix-blend-mode: overlay;
    opacity: 0.9;
  }
  .liquid-glass > * { position: relative; z-index: 1; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="env,react">
const { useState } = React;

function Navbar() {
  const [open, setOpen] = useState(false);
  const items = [
    { label: "Core Product", href: "core-product.html" },
    { label: "Case Studies", href: "case-studies.html" },
    { label: "About", href: "About.html" },
  ];
  return (
    <div className="sticky top-0 z-50 w-full liquid-glass" style={{ borderRadius: 0 }}>
      <div className="px-6 md:px-12 lg:px-16 py-3 flex items-center justify-between">
        <a href="index.html" className="text-2xl font-semibold text-black shrink-0" style={{ letterSpacing: "-0.04em" }} aria-label="REcollab home">
          REcollab
        </a>
        <div className="hidden md:flex items-center gap-8">
          {items.map((item) => (
            <a key={item.label} href={item.href} className="text-sm text-black hover:text-black transition-colors">
              {item.label}
            </a>
          ))}
        </div>
        <a href="book-a-demo.html" className="hidden md:block bg-black text-white px-6 py-2 rounded-lg text-sm font-medium hover:bg-black transition-colors">
          Book a Demo
        </a>
        <button className="md:hidden p-2 text-[#0f1c2e]" onClick={() => setOpen(o => !o)} aria-label="Toggle menu">
          {open
            ? <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            : <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          }
        </button>
      </div>
      {open && (
        <div className="md:hidden px-6 pb-5 flex flex-col" style={{ borderTop: '1px solid rgba(255,255,255,0.3)' }}>
          {items.map((item) => (
            <a key={item.label} href={item.href} className="text-sm text-[#0f1c2e] py-3" style={{ borderBottom: '1px solid rgba(15,28,46,0.06)' }}>
              {item.label}
            </a>
          ))}
          <a href="book-a-demo.html" className="mt-4 w-full bg-black text-white px-6 py-3 rounded-lg text-sm font-medium text-center block">
            Book a Demo
          </a>
        </div>
      )}
    </div>
  );
}

function Hero() {
  return (
    <section className="pt-40 pb-16 px-6">
      <div className="max-w-6xl mx-auto">
        <div className="text-[#0f1c2e] tracking-widest text-xs font-medium uppercase mb-4">
          Case Studies
        </div>
        <h1 className="text-5xl md:text-6xl font-normal text-[#0f1c2e] max-w-2xl mb-6" style={{ letterSpacing: "-0.03em", lineHeight: 1.05 }}>
          Our Case Studies
        </h1>
        <p className="text-[#0f1c2e] text-base max-w-xl leading-relaxed">
          See how our clients have used REcollab to optimize their building's financial future.
        </p>
      </div>
    </section>
  );
}

function Cards() {
  const studies = [
    {
      title: "Enterprise Avoids 140% Fee Hike",
      href: "case-studies-enterprise.html",
      image: "assets/case1.avif", ratio: "639/480",
      stats: [
        { num: "125%", label: "Increase in client capacity" },
        { num: "40%", label: "Retrofit cost savings" },
      ],
    },
    {
      title: "11-Unit Condo Escapes $132,000 Emergency Assessment",
      href: "case-studies-11-unit-condo.html",
      image: "assets/case2.avif", ratio: "639/480", overlay: 0.45,
      stats: [
        { num: "30-Year", label: "Plan with zero special assessments" },
      ],
    },
  ];

  return (
    <section className="pb-32 px-6">
      <div className="max-w-6xl mx-auto">
        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
          {studies.map((s) => (
            <div key={s.title} className="bg-white/60 backdrop-blur-md border border-white/80 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-all duration-200 flex flex-col">
              <div className="w-full overflow-hidden relative" style={{ aspectRatio: s.ratio }}>
                <img src={s.image} alt={s.title} style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                <div style={{ position: 'absolute', inset: 0, background: `rgba(0,0,0,${s.overlay ?? 0.25})` }} />
              </div>
              <div className="p-8 flex flex-col flex-1">
                <h2 className="text-xl font-semibold text-[#0f1c2e] mb-6" style={{ letterSpacing: "-0.02em", lineHeight: 1.3 }}>
                  {s.title}
                </h2>
                <div className="flex gap-10 mb-8 flex-wrap flex-1">
                  {s.stats.map((stat) => (
                    <div key={stat.label}>
                      <div className="text-2xl font-bold" style={{ color: '#D97757' }}>{stat.num}</div>
                      <div className="text-xs text-[#0f1c2e] mt-1">{stat.label}</div>
                    </div>
                  ))}
                </div>
                <a href={s.href} className="text-sm font-semibold text-[#0f1c2e] hover:text-[#D97757] transition-colors self-start">
                  Read Full Story →
                </a>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function Footer() {
  const links = [
    { label: "Product", href: "index.html" },
    { label: "Case Studies", href: "case-studies.html" },
    { label: "About", href: "About.html" },
    { label: "Book a Demo", href: "book-a-demo.html" },
  ];
  return (
    <footer className="w-full bg-[#0f1c2e] py-8 px-6">
      <div className="max-w-6xl mx-auto flex items-center justify-between flex-wrap gap-4">
        <div className="flex items-center gap-2.5">
          <img src="assets/recollab-logo.png" alt="REcollab" className="w-6 h-6" style={{ filter: "invert(1) brightness(2)" }} />
          <span className="text-white font-bold text-sm">REcollab</span>
        </div>
        <div className="flex flex-wrap items-center gap-x-6 gap-y-3 md:flex-nowrap md:gap-8">
          {links.map((l) => (
            <a key={l.label} href={l.href} className="text-white hover:text-white transition-colors text-xs">
              {l.label}
            </a>
          ))}
        </div>
        <div className="text-white text-xs">
          © 2025 REcollab Technologies, Inc.
        </div>
      </div>
    </footer>
  );
}

function App() {
  return (
    <>
      <Navbar />
      <Hero />
      <Cards />
      <Footer />
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

</body>
</html>
